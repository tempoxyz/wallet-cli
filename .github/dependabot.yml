version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Etc/UTC
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor
      development-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor
      major-dependencies:
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: Etc/UTC
    cooldown:
      default-days: 7
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
