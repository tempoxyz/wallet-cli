name: Build

on:
  push:
    tags:
      - "v*"
      - "tempo-wallet@*"
      - "tempo-request@*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to rebuild and publish
        required: false
        type: string

jobs:
  parse-tag:
    name: Parse tag
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.parse.outputs.packages }}
      version: ${{ steps.parse.outputs.version }}
      release_tag: ${{ steps.parse.outputs.release_tag }}
    steps:
      - name: Parse release version from tag
        id: parse
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          TAG="${INPUT_RELEASE_TAG:-${GITHUB_REF#refs/tags/}}"

          if [[ "$TAG" == v* ]]; then
            VERSION="${TAG#v}"
            PACKAGES='["tempo-wallet","tempo-request"]'
            RELEASE_TAG="$TAG"
          elif [[ "$TAG" == *"@"* ]]; then
            PACKAGE="${TAG%%@*}"
            VERSION="${TAG#*@}"
            RELEASE_TAG="$TAG"

            if [[ "$PACKAGE" == "tempo-wallet" || "$PACKAGE" == "tempo-request" ]]; then
              PACKAGES="[\"${PACKAGE}\"]"
            else
              echo "Unsupported package in tag: ${PACKAGE}" >&2
              exit 1
            fi
          elif [[ "$TAG" == refs/heads/* || "$TAG" == "$GITHUB_REF" ]]; then
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
            PACKAGES='["tempo-wallet","tempo-request"]'
            RELEASE_TAG="$TAG"
          else
            echo "Unsupported tag format: ${TAG}" >&2
            exit 1
          fi

          {
            echo "packages=${PACKAGES}"
            echo "version=${VERSION}"
            echo "release_tag=${RELEASE_TAG}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.package }} (${{ matrix.build.suffix }})
    permissions:
      contents: read
      id-token: write
      attestations: write
    needs: [parse-tag]
    runs-on: ${{ matrix.build.os }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.parse-tag.outputs.packages) }}
        build:
          - os: ubuntu-latest
            pkg_target: node22-linux-x64
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            pkg_target: node22-linux-arm64
            suffix: linux-arm64
          - os: macos-latest
            pkg_target: node22-macos-x64
            suffix: darwin-amd64
          - os: macos-latest
            pkg_target: node22-macos-arm64
            suffix: darwin-arm64
    env:
      PACKAGE: ${{ matrix.package }}
      TEMPO_WALLET_VERSION: ${{ needs.parse-tag.outputs.version }}
      TEMPO_WALLET_PACKAGE_NAME: ${{ matrix.package }}
      TEMPO_WALLET_PKG_TARGET: ${{ matrix.build.pkg_target }}
      TEMPO_WALLET_PACKAGE_SUFFIX: ${{ matrix.build.suffix }}
      TEMPO_WALLET_PACKAGE_DIR: artifacts
      TEMPO_WALLET_PACKAGE_OUTPUT: artifacts/${{ matrix.package }}-${{ matrix.build.suffix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.8 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm check:types

      - name: Check test types
        run: pnpm test:types

      - name: Run tests
        run: pnpm test

      - name: Build JavaScript
        run: pnpm build

      - name: Build TypeScript CLI release binary
        run: pnpm package

      - name: Smoke test host binary
        if: matrix.build.pkg_target == 'node22-linux-x64' || matrix.build.pkg_target == 'node22-linux-arm64' || matrix.build.pkg_target == 'node22-macos-arm64'
        run: ./artifacts/${PACKAGE}-${{ matrix.build.suffix }} --version

      - name: Generate sha256
        shell: bash
        run: |
          set -euo pipefail
          BIN="artifacts/${PACKAGE}-${{ matrix.build.suffix }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$BIN" > "$BIN.sha256"
          else
            shasum -a 256 "$BIN" > "$BIN.sha256"
          fi
          cat "$BIN.sha256"

      - name: Generate SBOM (SPDX-JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: artifacts/${{ env.PACKAGE }}-${{ matrix.build.suffix }}
          format: spdx-json
          output-file: artifacts/${{ env.PACKAGE }}-${{ matrix.build.suffix }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: artifacts/${{ env.PACKAGE }}-${{ matrix.build.suffix }}
          sbom-path: artifacts/${{ env.PACKAGE }}-${{ matrix.build.suffix }}.spdx.json

      - name: Attest build provenance (SLSA v1)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: artifacts/${{ env.PACKAGE }}-${{ matrix.build.suffix }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign binary with cosign (keyless)
        shell: bash
        run: |
          set -euo pipefail
          BIN="artifacts/${PACKAGE}-${{ matrix.build.suffix }}"
          cosign sign-blob --yes \
            --bundle "${BIN}.sigstore.json" \
            "$BIN"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PACKAGE }}-${{ matrix.build.suffix }}
          path: |
            artifacts/${{ env.PACKAGE }}-${{ matrix.build.suffix }}
            artifacts/${{ env.PACKAGE }}-${{ matrix.build.suffix }}.sha256
            artifacts/${{ env.PACKAGE }}-${{ matrix.build.suffix }}.spdx.json
            artifacts/${{ env.PACKAGE }}-${{ matrix.build.suffix }}.sigstore.json
          if-no-files-found: error

  publish:
    name: Publish ${{ matrix.package }}
    environment: release
    permissions:
      contents: write
    needs: [parse-tag, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (startsWith(github.ref, 'refs/tags/') || inputs.release_tag != '')
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.parse-tag.outputs.packages) }}
    env:
      PACKAGE: ${{ matrix.package }}
      VERSION: ${{ needs.parse-tag.outputs.version }}
      RELEASE_TAG: ${{ needs.parse-tag.outputs.release_tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: ${{ env.PACKAGE }}-*
          merge-multiple: true

      - name: Wait for GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${RELEASE_TAG}"
          for i in $(seq 1 40); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release ${TAG} found"
              exit 0
            fi
            echo "Waiting for release ${TAG}... (attempt ${i}/40)"
            sleep 15
          done
          echo "Release ${TAG} was not created in time" >&2
          exit 1

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" artifacts/* --clobber

      - name: Checkout release signing tool
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: tempoxyz/wallet-rs
          path: wallet-release-tools
          persist-credentials: false

      - name: Setup Rust
        run: rustup default stable

      - name: Build release signer
        run: cargo build --release -p tempo-sign
        working-directory: wallet-release-tools

      - name: Sign release binaries
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          echo -n "$RELEASE_SIGNING_KEY" | base64 -d > /tmp/release.key

          URL_PREFIX="https://cli.tempo.xyz/extensions/${PACKAGE}"

          declare -A PKG_DESC=(
            [tempo-wallet]="Manage your Tempo Wallet"
            [tempo-request]="Make an HTTP request"
          )

          SIGN_ARGS=(
            --key-file /tmp/release.key
            --artifacts-dir artifacts
            --version "$VERSION"
            --base-url "$URL_PREFIX"
            --description "${PKG_DESC[$PACKAGE]}"
            --output "artifacts/${PACKAGE}-manifest.json"
          )

          if [ "$PACKAGE" = "tempo-request" ] && [ -f "SKILL.md" ]; then
            SKILL_SHA256=$(sha256sum "SKILL.md" | cut -d' ' -f1)
            SIGN_ARGS+=(
              --skill "${URL_PREFIX}/v${VERSION}/SKILL.md"
              --skill-sha256 "$SKILL_SHA256"
              --skill-file "SKILL.md"
            )
          fi

          ./wallet-release-tools/target/release/tempo-sign sign "${SIGN_ARGS[@]}"

          rm /tmp/release.key

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws configure set default.s3.multipart_threshold 200MB

          PREFIX="extensions/${PACKAGE}"
          VTAG="v${VERSION}"

          for f in "artifacts/${PACKAGE}"-linux-* "artifacts/${PACKAGE}"-darwin-*; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            aws s3 cp "$f" "s3://tempo-cli/${PREFIX}/${BASENAME}" --endpoint-url "$AWS_ENDPOINT_URL"
            aws s3 cp "$f" "s3://tempo-cli/${PREFIX}/${VTAG}/${BASENAME}" --endpoint-url "$AWS_ENDPOINT_URL"
          done

          aws s3 cp "artifacts/${PACKAGE}-manifest.json" "s3://tempo-cli/${PREFIX}/manifest.json" --endpoint-url "$AWS_ENDPOINT_URL"
          aws s3 cp "artifacts/${PACKAGE}-manifest.json" "s3://tempo-cli/${PREFIX}/${VTAG}/manifest.json" --endpoint-url "$AWS_ENDPOINT_URL"

          if [ "$PACKAGE" = "tempo-request" ] && [ -f "SKILL.md" ]; then
            aws s3 cp "SKILL.md" "s3://tempo-cli/${PREFIX}/${VTAG}/SKILL.md" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/markdown"
          fi

          echo "${VERSION}" | aws s3 cp - "s3://tempo-cli/${PREFIX}/VERSION" --endpoint-url "$AWS_ENDPOINT_URL" --content-type "text/plain"

          echo "Released ${PACKAGE}@${VERSION}"
